<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Shadow blur filter -->
    <filter id="shadowBlur" color-interpolation-filters="sRGB" height="1.15" width="1.15" x="-.075" y="-.075">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Left shape gradient (blue) -->
    <linearGradient id="leftGrad" x1="69" y1="28" x2="69" y2="223" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3ec8f0"/>
      <stop offset=".3" stop-color="#16B0ED"/>
      <stop offset="1" stop-color="#0a4a9e"/>
    </linearGradient>

    <!-- Right shape gradient (green) -->
    <linearGradient id="rightGrad" x1="188" y1="28" x2="188" y2="223" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93cc50"/>
      <stop offset=".3" stop-color="#7DB643"/>
      <stop offset="1" stop-color="#2d6a2d"/>
    </linearGradient>

    <!-- Diagonal gradient (green, slightly different) -->
    <linearGradient id="diagGrad" x1="128" y1="29" x2="128" y2="223" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a0d860"/>
      <stop offset=".3" stop-color="#88C649"/>
      <stop offset="1" stop-color="#397538"/>
    </linearGradient>

    <!-- Specular highlight -->
    <radialGradient id="specular" cx="110" cy="60" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Outline gradient (white, fading from top) -->
    <linearGradient id="outlineGrad" x1="128" y1="25" x2="128" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#fff" stop-opacity=".15"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip for specular -->
    <clipPath id="nClip">
      <path d="M48.5,70.3 L89.9,28.5 L89.9,222.9 L48.5,181.6 Z"/>
      <path d="M89.9,28.8 L197.5,193.1 L167.4,223.2 L59.8,59.3 Z"/>
      <path d="M208.5,70.7 L166.6,28.5 L167.4,222.9 L208.7,181.6 Z"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Shadow (all shapes combined, shifted down) -->
  <g filter="url(#shadowBlur)" transform="translate(0,3)">
    <path d="M48.5,70.3 L89.9,28.5 L89.9,222.9 L48.5,181.6 Z" fill="#000" fill-opacity=".45"/>
    <path d="M89.9,28.8 L197.5,193.1 L167.4,223.2 L59.8,59.3 Z" fill="#000" fill-opacity=".45"/>
    <path d="M208.5,70.7 L166.6,28.5 L167.4,222.9 L208.7,181.6 Z" fill="#000" fill-opacity=".45"/>
  </g>

  <!-- Layer 2: Base shapes with gradients -->
  <!-- Left parallelogram (blue) -->
  <path d="M48.5,70.3 L89.9,28.5 L89.9,222.9 L48.5,181.6 Z" fill="url(#leftGrad)"/>

  <!-- Diagonal cross (green) - drawn before right so overlap is correct -->
  <path d="M89.9,28.8 L197.5,193.1 L167.4,223.2 L59.8,59.3 Z" fill="url(#diagGrad)"/>

  <!-- Shadow detail at intersection -->
  <path d="M89.9,104.6 L89.9,111.0 L56.8,62.1 L59.9,59.0 Z" fill="#000" fill-opacity=".13"/>

  <!-- Right parallelogram (green) -->
  <path d="M208.5,70.7 L166.6,28.5 L167.4,222.9 L208.7,181.6 Z" fill="url(#rightGrad)"/>

  <!-- Layer 3: Specular highlight -->
  <rect x="40" y="20" width="180" height="110" fill="url(#specular)" clip-path="url(#nClip)"/>

  <!-- Layer 4: Edge highlights on top edges -->
  <path d="M49.5,70 L89.9,29.5" fill="none" stroke="#fff" stroke-opacity=".35" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M60.5,59 L89.9,29.5" fill="none" stroke="#fff" stroke-opacity=".25" stroke-width="1" stroke-linecap="round"/>
  <path d="M207.5,71 L167,29.5" fill="none" stroke="#fff" stroke-opacity=".35" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Layer 5: Specular dots -->
  <ellipse cx="78" cy="42" rx="2.5" ry="1.2" fill="#fff" opacity=".55"/>
  <ellipse cx="180" cy="42" rx="2.5" ry="1.2" fill="#fff" opacity=".55"/>
  <ellipse cx="130" cy="35" rx="2" ry="1" fill="#fff" opacity=".4"/>

  <!-- Layer 6: Gradient stroke outlines -->
  <path d="M48.5,70.3 L89.9,28.5 L89.9,222.9 L48.5,181.6 Z" fill="none" stroke="url(#outlineGrad)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M89.9,28.8 L197.5,193.1 L167.4,223.2 L59.8,59.3 Z" fill="none" stroke="url(#outlineGrad)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M208.5,70.7 L166.6,28.5 L167.4,222.9 L208.7,181.6 Z" fill="none" stroke="url(#outlineGrad)" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
