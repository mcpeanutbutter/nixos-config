<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Shadow blur filter -->
    <filter id="shadowBlur" color-interpolation-filters="sRGB" height="1.15" width="1.15" x="-.075" y="-.075">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Blue stroke gradient -->
    <radialGradient id="strokeGrad" cx="128" cy="95" r="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6688ff"/>
      <stop offset=".5" stop-color="#4466ee"/>
      <stop offset="1" stop-color="#2233cc"/>
    </radialGradient>

    <!-- Ghost body gradient -->
    <radialGradient id="bodyGrad" cx="125" cy="90" r="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".6" stop-color="#f0f2f8"/>
      <stop offset="1" stop-color="#d0d4e0"/>
    </radialGradient>

    <!-- Specular highlight -->
    <radialGradient id="specular" cx="115" cy="75" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Prompt symbol gradient -->
    <linearGradient id="promptGrad" x1="95" y1="116" x2="95" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2a3a"/>
      <stop offset="1" stop-color="#1a1a28"/>
    </linearGradient>

    <!-- Ghost shape clip path -->
    <clipPath id="ghostClip">
      <path d="M128 28 C62 28, 34 78, 34 122 L34 192 Q66 238, 98 192 Q128 238, 158 192 Q190 238, 222 192 L222 122 C222 78, 194 28, 128 28 Z"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Drop shadow (ghost shape, shifted down) -->
  <path d="M128 28 C62 28, 34 78, 34 122 L34 192 Q66 238, 98 192 Q128 238, 158 192 Q190 238, 222 192 L222 122 C222 78, 194 28, 128 28 Z"
    transform="translate(0,10)" fill="#000" fill-opacity=".6" filter="url(#shadowBlur)"/>

  <!-- Layer 2: Ghost with blue stroke border (stroke painted first, then fill on top) -->
  <path d="M128 28 C62 28, 34 78, 34 122 L34 192 Q66 238, 98 192 Q128 238, 158 192 Q190 238, 222 192 L222 122 C222 78, 194 28, 128 28 Z"
    fill="url(#bodyGrad)" stroke="url(#strokeGrad)" stroke-width="18" paint-order="stroke fill"/>

  <!-- Layer 3: Terminal prompt >_ as paths -->
  <!-- Chevron ">" -->
  <path d="M88 116 L112 134 L88 152"
    fill="none" stroke="url(#promptGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore "_" (aligned with chevron tip at y=126) -->
  <path d="M132 134 L168 134"
    fill="none" stroke="url(#promptGrad)" stroke-width="12" stroke-linecap="round"/>

  <!-- Layer 4: Specular highlight (clipped to ghost shape) -->
  <ellipse cx="112" cy="72" rx="65" ry="42" fill="url(#specular)" clip-path="url(#ghostClip)"/>

  <!-- Layer 5: Edge highlight on the outer edge of the blue stroke -->
  <path d="M64 34 C78 24, 102 19, 128 19 C154 19, 178 24, 192 34"
    fill="none" stroke="#fff" stroke-opacity=".35" stroke-width="1.5" stroke-linecap="round"/>
</svg>
